spring:
  datasource:
    url: jdbc:h2:mem:hexagonal_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

logging:
  level:
    com.wesleytaumaturgo.hexagonal: WARN
    org.hibernate: WARN
